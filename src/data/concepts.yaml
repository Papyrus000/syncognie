    question: changement
    domaine: "psychologie organisationnelle / cognitive"
    penseur: "Tasha Eurich"
    statut: nuance
    definition_courte: "La conscience de soi a deux composantes indépendantes — connaître ses propres valeurs/patterns ET comprendre comment les autres nous perçoivent — et l'introspection non guidée peut aggraver les deux."
    definition: |
      Eurich (recherche sur 5000 personnes) a trouvé que 95% des gens se croient
      conscients d'eux-mêmes mais seulement 10-15% le sont selon des critères
      objectifs. La conscience interne : clarté sur ses valeurs, émotions, patterns,
      forces et faiblesses. La conscience externe : comprendre comment on est perçu
      par les autres. Les deux sont faiblement corrélées — on peut être fort sur
      l'une et faible sur l'autre. L'introspection classique ("pourquoi") est
      contre-productive : elle produit des explications confabulées qui renforcent
      les croyances existantes. Eurich recommande de remplacer "pourquoi" par "quoi"
      — "que ressentais-je ?" plutôt que "pourquoi ai-je réagi ainsi ?". Le feedback
      calibré de personnes de confiance est plus fiable que l'introspection seule.
    utilite: |
      Remet en cause l'introspection spontanée comme outil fiable. Oriente vers
      des pratiques plus efficaces : journaling factuel, feedback externe,
      questions "quoi" plutôt que "pourquoi".
    pattern: "Je pense me connaître mais les autres me décrivent différemment. Mon introspection tourne en rond sans produire de changement."
    concepts_lies:
      - "meta-cognition"
      - "distorsions-cognitives-de-beck"
