    definition_courte: "On monte automatiquement d'une observation brute à une conclusion abstraite en sautant des étapes — et on agit sur la conclusion comme si c'était la réalité."
    definition: |
      Argyris identifie les échelons : données brutes → données sélectionnées →
      signification ajoutée → hypothèses → conclusions → croyances → actions.
      On monte cet escalier en quelques millisecondes, hors conscience. La boucle
      réflexive : nos croyances filtrent quelles données on sélectionne, ce qui
