    definition_courte: "La résilience n'est pas une qualité innée mais un processus dynamique influencé par des facteurs identifiables et partiellement modifiables."
    definition: |
      Bonanno a montré que la résilience (maintien ou rapide retour au fonctionnement
      normal après un trauma) est la trajectoire la plus commune après événement
      traumatique — pas l'exception héroïque. Les facteurs protecteurs documentés :
      soutien social (le plus robuste), sentiment d'efficacité personnelle (Bandura),
      attribution interne/stable/contrôlable, flexibilité cognitive, régulation
      émotionnelle, sens donné à l'adversité. Cyrulnik a popularisé le concept de
      "tuteur de résilience" — une relation bienveillante qui permet la reconstruction.
      La croissance post-traumatique (Tedeschi) : certains développent de nouvelles
      forces ou perspectives après l'adversité — réelle mais pas universelle et
      ne doit pas être prescrite. Statut nuancé : concept opérationnalisé diversement,
      risque de moralisation ("il faut être résilient").
    utilite: |
      Identifier et renforcer les facteurs protecteurs modifiables (relations sociales,
      sens, compétences) plutôt que d'attendre une résilience innée. Le soutien social
      est l'intervention la plus évidente et la plus négligée.
    pattern: "Je m'effondre plus que les autres face à l'adversité. Je ne comprends pas pourquoi certains rebondissent vite et pas moi."
