    definition_courte: "Le microbiome intestinal communique bidirectionnellement avec le cerveau et influence l'humeur, l'anxiété et le comportement."
    definition: |
      L'intestin contient environ 500 millions de neurones (système nerveux entérique)
      et 90% de la sérotonine corporelle y est produite. Le nerf vague constitue
      la voie de communication principale avec le cerveau. Des études chez l'animal
      montrent des effets robustes du microbiome sur le comportement et l'anxiété ;
