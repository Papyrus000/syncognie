    penseur: "Joey Cheng, Robert Sapolsky, Lucio Buffalmano"
    statut: nuance
    definition_courte: "Les humains organisent spontanément des hiérarchies sociales selon deux voies — dominance (peur) et prestige (admiration) — avec des effets biologiques et comportementaux mesurables."
    definition: |
      Cheng a distingué deux voies d'acquisition du statut : dominance (intimidation,
      coercition, prise d'espace) et prestige (compétence reconnue, générosité,
      réputation). Les deux activent des comportements de déférence mais par des
      mécanismes différents. Sapolsky a montré chez les babouins (et analogies humaines)
      les effets physiologiques du statut sur le cortisol, la santé cardiovasculaire
      et la longévité — le statut bas est un stresseur chronique. Les humains
      évaluent le statut dans les premières secondes d'interaction (posture, voix,
      regard, occupation de l'espace). Ces évaluations sont largement inconscientes.
      Statut nuancé : les analogies primates-humains sont suggestives, pas directement
      transposables ; les signaux de statut sont culturellement variables.
    utilite: |
      Comprendre la dynamique de statut dans les groupes explique des comportements
      qui semblent irrationnels (jalousie, humiliation, déférence automatique).
      Conscience des signaux non verbaux de statut qu'on émet et reçoit.
