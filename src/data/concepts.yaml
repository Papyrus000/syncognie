  - titre: "Récupération et cycles d'effort"
    vocabulaire:
      - "surcompensation"
      - "surentraînement (overtraining)"
      - "périodisation"
      - "cycles ultradiens"
      - "charge d'entraînement"
      - "dette de récupération"
      - "fenêtre anabolique"
      - "repos actif"
    question: sante
    domaine: "physiologie de l'exercice / performance"
    penseur: "Eliezer Kreindler, Andrew Huberman, Peter Attia"
    statut: solide
    definition_courte: "La progression vient du repos autant que de l'effort — l'adaptation se produit pendant la récupération, pas pendant l'exercice."
    definition: |
      La surcompensation : après un stress (exercice, apprentissage), le système
      revient à la baseline puis la dépasse légèrement — à condition de récupérer
      suffisamment avant le prochain stress. Le surentraînement survient quand
      les stress s'accumulent sans récupération adéquate. Les cycles ultradiens
      (90 min) structurent les capacités attentionnelles et physiques tout au long
      de la journée — Huberman recommande d'aligner les blocs d'effort sur ces
      cycles. La périodisation (hard/easy alternance) est le principe central de
      tout entraînement efficace à long terme. La HRV et la qualité du sommeil
      sont les marqueurs objectifs de récupération. Le principe s'applique à
      l'apprentissage cognitif autant qu'au sport.
    utilite: |
      Structurer travail intense et récupération délibérée plutôt que de pousser
      en continu. Prévoir des semaines de décharge, des nuits suffisantes, des
      blocs de travail avec pauses. La fatigue chronique est souvent un déficit
      de récupération, pas un manque d'effort.
    pattern: "Je donne tout en permanence et je régresse ou m'effondre. Je confonds activité intense avec progression."
    concepts_lies:
      - "hrv-variabilite-de-la-frequence-cardiaque"
      - "sommeil"
