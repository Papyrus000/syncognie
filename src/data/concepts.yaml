    question: emotions
    domaine: "psychologie clinique"
    penseur: "Aaron Beck, David Burns"
    statut: solide
    definition_courte: "Dix erreurs de traitement de l'information systématiques et reconnaissables qui alimentent la détresse émotionnelle."
    definition: |
      Beck a identifié des patterns de pensée automatique caractéristiques dans
      la dépression et l'anxiété. Burns les a popularisés dans *Feeling Good* (1980).
      Les dix distorsions principales : (1) tout-ou-rien — "si ce n'est pas parfait,
      c'est un échec" ; (2) surgénéralisation — "ça arrive toujours" ; (3) filtre
      mental — ne voir que le négatif ; (4) disqualification du positif — "ça ne compte
      pas" ; (5) lecture de pensée — supposer ce que l'autre pense ; (6) erreur de
      prédiction — anticiper le pire comme certain ; (7) catastrophisation — amplifier
      les problèmes ; (8) raisonnement émotionnel — "je le ressens donc c'est vrai" ;
      (9) personnalisation — se tenir responsable de tout ; (10) devrait/faut —
      règles rigides qui produisent culpabilité et ressentiment. Elles s'activent
      souvent en chaîne.
    utilite: |
      Nommer une distorsion en cours d'activation crée un espace entre l'expérience
      et la croyance. Burns recommande le "double standard" : appliquer à soi le
      même raisonnement qu'on appliquerait à un ami.
    pattern: "Je sais que ma pensée est exagérée mais je n'arrive pas à m'en sortir. Mon autocritique est disproportionnée aux faits."
