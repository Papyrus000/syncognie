    definition_courte: "Au-delà d'un certain niveau d'activation physiologique, le cerveau perd sa capacité de traitement rationnel — le conflit devient impossible à résoudre."
    definition: |
      Gottman a mesuré que quand la fréquence cardiaque dépasse environ 100 bpm
      en conflit, la capacité de traitement de l'information complexe s'effondre.
      On est en survie, pas en dialogue. Le stonewalling est souvent une réponse
      à ce flooding — un mécanisme de protection physiologique, pas de la
      mauvaise volonté. La pause structurée (minimum 20 minutes, activité calme)
      permet au système nerveux de se réguler. Reprendre la conversation avant
      est contre-productif.
    utilite: |
      Comprend que certains conflits ne peuvent pas être résolus dans le moment —
      non par manque de volonté mais par physiologie. La pause n'est pas de la
      fuite, c'est une condition de la résolution.
    pattern: "Nos disputes s'emballent et rien n'est résolu. Je dis des choses que je regrette quand je suis énervé."
    concepts_lies:
