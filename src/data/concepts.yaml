    question: corps
    domaine: "psychologie clinique / neurosciences"
    penseur: "Francine Shapiro"
    statut: solide
    definition_courte: "Thérapie structurée utilisant des stimulations bilatérales alternées pour retraiter des souvenirs traumatiques bloqués."
    definition: |
      Shapiro a découvert en 1987 que les mouvements oculaires rapides réduisaient
      la détresse associée à des souvenirs perturbants. L'EMDR s'appuie sur le modèle
      du traitement adaptatif de l'information : les souvenirs traumatiques restent
      stockés de manière isolée, non intégrés au réseau mémoriel général, ce qui
      explique leur réactivation intrusive. La stimulation bilatérale (mouvements
      oculaires, tapping, sons alternés) faciliterait la reconsolidation et
      l'intégration. Le mécanisme exact reste débattu — la composante bilatérale
      pourrait ne pas être l'ingrédient actif principal. L'efficacité sur le PTSD
      est bien documentée (OMS, APA en font un traitement de première ligne),
      supérieure à l'absence de traitement, comparable aux TCC trauma-focalisées.
    utilite: |
      Alternative aux TCC pour les personnes qui ne peuvent pas parler du trauma
      en détail. Efficace en nombre de séances relativement restreint pour le PTSD
      simple. Moins établi pour le trauma complexe ou les troubles dissociatifs.
    pattern: "J'ai des souvenirs qui resurgiront de façon incontrôlable. Certains événements passés continuent de perturber ma vie présente."
    concepts_lies:
      - "dissociation-et-trauma-complexe"
