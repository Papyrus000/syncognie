    penseur: "Irvin Yalom, Ernest Becker, Jeff Greenberg (TMT)"
    statut: nuance
    definition_courte: "La prise de conscience de sa mortalité est une source d'anxiété fondamentale mais aussi, travaillée consciemment, un puissant moteur de sens et d'authenticité."
    definition: |
      Yalom identifie quatre préoccupations ultimes : mort, liberté, isolement,
      absence de sens. La mort est la plus fondamentale — Becker (*The Denial of Death*)
      soutient que la majeure partie de la culture humaine est une défense contre
      l'anxiété de la mortalité. La Terror Management Theory (TMT, Greenberg) a
      testé expérimentalement cette thèse : rappeler aux gens leur mortalité (mortality
      salience) amplifie le conformisme, la défense du groupe d'appartenance, le
      rejet de l'autre. L'alternative existentielle (Yalom) : intégrer la finitude
      consciemment plutôt que la fuir par des défenses — ce travail peut libérer
      de l'énergie pour vivre plus authentiquement. Les Stoïciens (memento mori),
      les Épicuriens et Heidegger (être-vers-la-mort) convergent sur ce point.
    utilite: |
      Remettre en contact avec la finitude peut clarifier les priorités, dissoudre
      des peurs secondaires et démasquer des évitements. Thérapie existentielle
      adaptée aux crises de sens, deuils, maladies, transitions majeures.
