      déjà. La myopie temporelle : on sous-évalue fortement le futur par rapport
      au présent. La comptabilité mentale : on traite différemment de l'argent
      selon d'où il vient (un remboursement fiscal dépensé différemment qu'un
      salaire). Ces phénomènes sont reproductibles et exploitables — en bien
      (santé publique) ou en mal (marketing).
    utilite: |
