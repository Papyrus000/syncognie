    question: sante
    domaine: "biologie / médecine"
    penseur: "Satchin Panda, Russell Foster, Till Roenneberg"
    statut: solide
    definition_courte: "Presque tous les processus biologiques suivent des rythmes de 24h — travailler contre ces rythmes a des coûts de santé mesurables."
    definition: |
      Le noyau suprachiasmatique de l'hypothalamus est l'horloge centrale synchronisée
      principalement par la lumière. Chaque cellule du corps possède sa propre horloge
      périphérique. Les zeitgebers (lumière, alimentation, exercice, température)
      synchronisent ces horloges. Le jet lag social : décalage entre le chronotype
      biologique et les horaires sociaux — très fréquent, associé à une augmentation
      du risque de diabète, dépression, obésité. Roenneberg a montré que 80% de
      la population est en dette de synchronisation. La CAR : pic de cortisol dans
      les 30-45 minutes suivant le réveil, phase naturelle d'activation cognitive.
      Prix Nobel de médecine 2017 attribué aux mécanismes moléculaires des rythmes
      circadiens (Hall, Rosbash, Young).
    utilite: |
      Aligner lumière du matin, exercice, alimentation et sommeil avec le chronotype
      optimise énergie, performance cognitive et santé métabolique. Éviter la lumière
      bleue le soir et l'alimentation nocturne sont les leviers les plus accessibles.
    pattern: "Je suis épuisé le matin même après 8h de sommeil. Mon énergie et ma clarté mentale fluctuent de façon imprévisible."
    concepts_lies:
