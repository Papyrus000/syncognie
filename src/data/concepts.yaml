    question: corps
    domaine: "physiologie / psychophysiologie"
    penseur: "Stephen Porges (contexte), HeartMath Institute, recherche autonome"
    statut: nuance
    definition_courte: "La variation de l'intervalle entre battements cardiaques est un marqueur de la flexibilité du système nerveux autonome et de la capacité de récupération."
    definition: |
      Une HRV haute indique que le système nerveux autonome peut s'adapter rapidement
      aux demandes — équilibre entre activation (sympathique) et récupération
      (parasympathique). Une HRV basse est associée au stress chronique, à la
      fatigue, aux maladies cardiovasculaires, aux troubles anxieux. La HRV se
      mesure par appareils portables (Oura, Polar, Garmin) et fluctue selon le
      sommeil, l'alcool, l'exercice, le stress. La cohérence cardiaque (5 respirations/min)
      augmente la HRV à court terme. La HRV est un outil de biofeedback utile
      pour doser l'intensité d'entraînement et la récupération. Statut nuancé :
      marqueur utile, mais valeurs inter-individuelles très variables — la tendance
      personnelle importe plus que la valeur absolue.
    utilite: |
      Outil objectif pour évaluer son état de récupération et ajuster effort et
      repos. La technique cohérence cardiaque (3x5min/jour) a des effets anxiolytiques
      documentés à court terme.
    pattern: "Je pousse quand je devrais récupérer. Je ne sais pas si mon corps est prêt à un effort ou en déficit."
