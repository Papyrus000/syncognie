    statut: solide
    definition_courte: "Une affirmation n'est scientifique que si elle peut être réfutée — et la force d'une croyance doit être proportionnelle aux preuves."
    definition: |
      Popper a résolu le problème de la démarcation : qu'est-ce qui distingue
      la science de la pseudo-science ? La réfutabilité. Une théorie scientifique
      doit pouvoir être fausse. La psychanalyse classique, l'homéopathie, l'astrologie
      ne sont pas fausses — elles sont irréfutables, ce qui est pire. Hume sur
      l'induction : observer 1000 cygnes blancs ne prouve pas que tous les cygnes
      sont blancs. Cette asymétrie est centrale : on ne peut que réfuter, jamais
      prouver définitivement. La force d'une croyance doit être proportionnelle
      aux preuves disponibles — ni plus, ni moins.
    utilite: |
      C'est la méta-compétence qui permet d'évaluer toutes les autres connaissances.
      Sans elle, on est vulnérable à n'importe quelle théorie cohérente mais fausse.
    pattern: "Je crois des choses parce qu'elles sont cohérentes ou séduisantes, pas parce qu'elles sont prouvées. Je ne sais pas comment évaluer une affirmation."
    concepts_lies:
