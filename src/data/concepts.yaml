    question: sante
    domaine: "nutrition / physiologie métabolique"
    penseur: "Valter Longo, Satchin Panda, Mark Mattson"
    statut: nuance
    definition_courte: "Restreindre les périodes d'alimentation à une fenêtre quotidienne ou hebdomadaire pour améliorer la sensibilité à l'insuline et déclencher l'autophagie."
    definition: |
      Le jeûne intermittent regroupe plusieurs protocoles : 16:8 (manger sur 8h,
      jeûner 16h), 5:2 (5 jours normaux, 2 jours très restreints), OMAD (un repas
      par jour). Panda a développé le time-restricted eating (TRE) en alignant
      la fenêtre d'alimentation sur le rythme circadien — manger tôt dans la journée.
      L'autophagie (Ohsumi, Nobel 2016) : processus de recyclage cellulaire activé
      par le jeûne, impliqué dans la longévité. Les effets documentés incluent
      l'amélioration de la sensibilité à l'insuline, la réduction du poids (principalement
      par restriction calorique induite), des marqueurs métaboliques améliorés.
      Statut nuancé : effets réels mais souvent comparables à une restriction
      calorique équivalente — l'autophagie chez l'humain sain est difficile à mesurer.
      Déconseillé pour certaines populations (antécédents TCA, femmes enceintes).
    utilite: |
      Outil pratique pour réduire la fenêtre d'alimentation sans compter les
      calories. Peut améliorer l'énergie et la clarté mentale chez certaines
      personnes (transition initiale difficile). Aligner la fenêtre d'alimentation
      sur le matin améliore les marqueurs métaboliques vs alimentation nocturne.
    pattern: "Je grignote en permanence. Mon énergie fluctue fortement selon les repas. Je cherche à améliorer ma composition corporelle."
    concepts_lies:
