    definition_courte: "La capacité à observer sa propre pensée — et à reconnaître les limites de sa compétence — est la compétence qui améliore toutes les autres."
    definition: |
      Flavell a formalisé la méta-cognition : la connaissance de ses propres
      processus cognitifs et leur régulation. L'effet Dunning-Kruger : les moins
      compétents sur-estiment leurs compétences (ils manquent de la compétence
      pour évaluer leur incompétence). Les plus compétents sous-estiment parfois
      (ils savent ce qu'ils ne savent pas). Le cercle de compétence (Munger) :
      connaître précisément le domaine dans lequel son jugement est fiable —
      et ne pas déborder.
    utilite: |
      Savoir ce qu'on ne sait pas est plus utile que croire savoir ce qu'on
      ne sait pas. La méta-cognition est entraînable par la pratique réflexive.
    pattern: "Je m'exprime avec confiance sur des sujets que je connais mal. Je ne sais pas distinguer ce que je sais de ce que je crois savoir."
