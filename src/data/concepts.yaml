    question: emotions
    domaine: "psychologie motivationnelle"
    penseur: "Edward Deci, Richard Ryan"
    statut: solide
    definition_courte: "Trois besoins psychologiques universels — compétence, autonomie, appartenance — dont la satisfaction ou la frustration prédit le bien-être et la motivation."
    definition: |
      Deci et Ryan ont développé la SDT (Self-Determination Theory) sur 40 ans
      de recherche. Trois besoins de base : autonomie (se sentir à l'origine de
      ses actions), compétence (se sentir efficace), appartenance (se sentir relié
      à autrui). Leur satisfaction prédit la motivation intrinsèque, le bien-être
      et la persistance. Leur frustration chronique prédit la psychopathologie,
      la motivation contrôlée (faire pour éviter la honte ou gagner des récompenses)
      et le désengagement. Différence critique avec Maslow : la SDT est empiriquement
      testée et ne postule pas de hiérarchie — les trois besoins sont simultanément
      actifs. La récompense extrinsèque peut détruire la motivation intrinsèque
      (overjustification effect, répliqué).
    utilite: |
      Explique pourquoi certains emplois bien rémunérés sont misérables et pourquoi
      certaines activités non rémunérées sont épanouissantes. Diagnostiquer lequel
      des trois besoins est chroniquement frustré oriente les changements à faire.
    pattern: "Je n'ai plus envie de rien malgré une vie objectivement correcte. Je fais les choses par obligation et non par désir."
    concepts_lies:
      - "flow-etat-optimal-dexperience"
      - "regulation-emotionnelle"
      - "resilience-facteurs-documentes"
