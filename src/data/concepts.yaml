      - "fenêtre de tolérance"
    question: corps
    domaine: "neurophysiologie"
    penseur: "Walter Cannon, Stephen Porges, Peter Levine"
    statut: solide
    definition_courte: "Le système nerveux autonome régule en permanence l'état physiologique — et cet état détermine les capacités cognitives, émotionnelles et relationnelles disponibles."
    definition: |
      Le sympathique mobilise : accélère le cœur, dilate les poumons, redirige
      le sang vers les muscles. Utile en danger aigu, destructeur en activation
      chronique. Le parasympathique restaure : ralentit le cœur, active la
      digestion, facilite le lien social. La HRV (variabilité cardiaque) est
      le meilleur indicateur de l'équilibre entre les deux — plus elle est élevée,
      plus le système est flexible et résilient. Le nerf vague est le câble
      principal du parasympathique — modulable par la respiration, le chant,
      le froid, la connexion sociale.
    utilite: |
      L'état du système nerveux autonome détermine qui tu es dans l'instant :
      curieux ou défensif, créatif ou rigide, connecté ou isolé. Le moduler
      directement (respiration, froid, exercice) est le levier le plus rapide.
    pattern: "Je suis incapable de penser clairement quand je suis stressé. Je ne me reconnais pas dans certaines situations de pression."
    concepts_lies:
      - "physiologie-du-stress"
      - "interoception"
      - "hrv-variabilite-de-la-frequence-cardiaque"
      - "systeme-nerveux-autonome"

  - titre: "Physiologie du stress"
    vocabulaire:
      - "axe HPA (hypothalamo-hypophyso-surrénalien)"
      - "cortisol"
      - "adrénaline / noradrénaline"
      - "stress aigu vs chronique"
      - "allostasie"
      - "charge allostatique"
      - "réponse de défi vs menace"
    question: corps
    domaine: "endocrinologie / neurosciences"
    penseur: "Hans Selye, Bruce McEwen, Kelly McGonigal, Robert Sapolsky"
    statut: solide
    definition_courte: "Le stress aigu est adaptatif, le stress chronique est destructeur — et la perception du stress modifie sa physiologie."
    definition: |
      Selye a introduit le concept de stress biologique. L'axe HPA libère cortisol
      et adrénaline face à une menace perçue. Utile en aigu (survie, performance),
      destructeur en chronique : dégradation de la mémoire hippocampique, suppression
      immunitaire, inflammation, risque cardiovasculaire. McGonigal a montré que
      la croyance sur le stress modifie sa physiologie : voir le stress comme
      préparation (réponse de défi : DHEA+cortisol, dilatation vasculaire) versus
      menace (cortisol seul, constriction vasculaire) produit des profils physiologiques
      et des résultats mesurables différents.
    utilite: |
      Réinterpreter le stress comme signal de préparation plutôt que menace
      existentielle change la physiologie réelle. Pas du positive thinking —
      une intervention neurobiologique documentée.
    pattern: "Je suis chroniquement épuisé. Mon stress devient de l'anxiété qui devient un fond permanent."
    concepts_lies:
      - "systeme-nerveux-autonome"
      - "inflammation-chronique-de-bas-grade"
      - "sommeil"
      - "hormese"

