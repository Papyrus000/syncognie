    definition_courte: "Résoudre un problème en se demandant comment produire le résultat opposé — la clarté vient souvent par l'inversion."
    definition: |
      Jacobi (mathématicien) : "Inverser, toujours inverser." Pour réussir,
      demandez-vous ce qui cause l'échec et évitez-le. Le pré-mortem (Gary Klein) :
      imaginer que le projet a échoué et remonter aux causes — plus efficace
      que le post-mortem. La via negativa stoïcienne : définir ce qu'on ne veut
      pas plutôt que ce qu'on veut, éliminer plutôt qu'ajouter. Munger applique
      cela à tout : "je veux juste savoir où je vais mourir pour ne jamais y aller."
    utilite: |
      Beaucoup de problèmes sont insolubles frontalement et se dissolvent par
      inversion. Éviter les erreurs majeures est plus puissant qu'optimiser.
    pattern: "Je me concentre sur ce que je veux sans penser à ce qui peut bloquer. Mes plans ne tiennent pas compte des obstacles prévisibles."
