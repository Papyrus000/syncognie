  - titre: "Flow — état optimal d'expérience"
    vocabulaire:
      - "flow (flux)"
      - "état optimal d'expérience"
      - "rapport défi/compétence"
      - "absorption totale"
      - "autotélique"
      - "feedback immédiat"
      - "perte de conscience de soi"
    question: clarte
    domaine: "psychologie positive"
    penseur: "Mihaly Csikszentmihalyi"
    statut: nuance
    definition_courte: "État d'absorption totale dans une activité calibrée — le défi dépasse légèrement la compétence — associé à une expérience subjective optimale."
    definition: |
      Csikszentmihalyi a étudié des milliers de personnes (artistes, chirurgiens,
      joueurs d'échecs, grimpeurs) et identifié un état qualitativement distinct :
      concentration totale, perte de la conscience du temps, fusion action-conscience,
      sentiment de contrôle. Les conditions nécessaires : objectif clair, feedback
      immédiat, équilibre défi/compétence (ni trop facile → ennui, ni trop difficile
      → anxiété). L'activité est autotélique — faite pour elle-même. Les neurosciences
      du flow (Arne Dietrich) : réduction temporaire de l'activité du cortex préfrontal
      (hypofrontalité transitoire), libération de dopamine, noradrénaline, anandamide.
      Statut nuancé : concept influent, définition opérationnelle variable, difficile
      à provoquer à la demande.
    utilite: |
      Concevoir les activités pour maximiser les conditions du flow (clarté d'objectif,
      feedback rapide, difficulté appropriée) plutôt que d'attendre l'inspiration.
      Identifier les activités qui produisent du flow naturellement.
    pattern: "Certaines activités font disparaître le temps. D'autres me semblent interminables malgré l'effort."
    concepts_lies:
      - "attention-profonde-deep-work"
      - "besoins-fondamentaux-sdt"
      - "recuperation-et-cycles-deffort"
      - "meta-cognition"

  - titre: "Antifragilité"
    vocabulaire:
      - "antifragilité"
      - "convexité des résultats"
      - "optionnalité"
      - "barbell strategy"
      - "via negativa"
      - "fragilité / robustesse / antifragilité"
      - "cygne noir"
    question: clarte
    domaine: "philosophie / théorie de la décision"
    penseur: "Nassim Nicholas Taleb"
    statut: nuance
    definition_courte: "Certains systèmes bénéficient du désordre, de la variabilité et des chocs — l'antifragilité va au-delà de la résilience."
    definition: |
      Taleb distingue fragile (se casse sous le stress), robuste (résiste sans
      changer), antifragile (gagne de la variabilité et des chocs). Le fragile
      déteste l'incertitude ; l'antifragile en a besoin. Exemples : les muscles
      (s'affaiblissent sans stress), l'évolution, certains marchés. La barbell
      strategy : combiner positions très sécurisées et positions très risquées
      en évitant le milieu (risque modéré mais caché). L'optionnalité : chercher
      des positions à convexité positive (peu à perdre, beaucoup à gagner) et
      éviter les positions à convexité négative. La via negativa : enlever plutôt
      qu'ajouter, éviter les catastrophes plutôt qu'optimiser les performances.
      Statut nuancé : framework intellectuellement puissant mais prescriptions
      concrètes parfois vagues ; certaines analogies biologie-finance-vie personnelle
      forcées.
    utilite: |
      Réorienter l'objectif : ne pas chercher à éliminer l'incertitude (fragile)
      ni à la résister (robuste) mais à construire des systèmes qui en bénéficient.
      Diagnostiquer la fragilité dans sa propre vie (dépendances, manque de marge).
    pattern: "Je cherche la stabilité à tout prix et je suis dévasté par les imprévus. Je ne prends aucun risque par peur de perdre."
    concepts_lies:
      - "pensee-probabiliste"
      - "raisonnement-par-inversion"
      - "second-ordre-de-consequences"
      - "resilience-facteurs-documentes"

  - titre: "Attention profonde — Deep Work"
    vocabulaire:
      - "deep work (travail profond)"
      - "shallow work (travail superficiel)"
      - "attention fragmentée"
      - "résidu d'attention"
      - "solitude productive"
      - "blocs de concentration"
      - "coût de commutation (task switching)"
    question: clarte
    domaine: "psychologie cognitive / productivité"
    penseur: "Cal Newport"
    statut: nuance
    definition_courte: "La capacité à se concentrer sans distraction sur une tâche cognitivement exigeante est une compétence rare, entraînable, et productivement décisive."
    definition: |
      Newport distingue le deep work (activité professionnelle réalisée dans un
      état de concentration sans distraction, poussant les capacités cognitives
      à leur maximum) du shallow work (tâches logistiques, emails, réunions).
      Le coût de commutation (task switching) : chaque interruption laisse un
      "résidu d'attention" — Sophie Leroy a montré que l'esprit continue à traiter
      la tâche précédente même après avoir changé de tâche. Les études sur la
      distraction (Gloria Mark) montrent qu'une interruption coûte en moyenne
      23 minutes de récupération. Newport s'appuie sur Anders Ericsson pour
      soutenir que la pratique délibérée — qui requiert une concentration totale
      — est le mécanisme du développement de compétences. Statut nuancé : framework
      pratique bien construit, bonne base empirique sur les coûts de la distraction,
      prescriptions parfois idéalisées.
    utilite: |
      Structurer la journée en blocs de deep work protégés (2-4h), éliminer
      les interruptions pendant ces blocs, battre les emails et réseaux sociaux
      à des plages dédiées. L'environnement physique et numérique doit soutenir
      la concentration.
    pattern: "Je suis constamment interrompu et je n'avance jamais sur ce qui compte vraiment. Je finis mes journées épuisé mais sans avoir avancé."
    concepts_lies:
      - "flow-etat-optimal-dexperience"
      - "recuperation-et-cycles-deffort"
      - "solitude-et-ressourcement"
      - "pre-engagement-dispositifs-dulysse"

  - titre: "Mémoire — types et consolidation"
    vocabulaire:
      - "mémoire déclarative (explicite)"
      - "mémoire procédurale (implicite)"
      - "mémoire épisodique / sémantique"
      - "consolidation mémorielle"
      - "courbe de l'oubli (Ebbinghaus)"
      - "répétition espacée (spaced repetition)"
      - "récupération active (retrieval practice)"
      - "effet de test (testing effect)"
      - "souvenir flash (flashbulb memory)"
    question: clarte
    domaine: "neurosciences cognitives"
    penseur: "Hermann Ebbinghaus, Henry Molaison (cas HM), Robert Bjork"
    statut: solide
    definition_courte: "La mémoire n'est pas un enregistrement passif mais un processus actif de reconstruction — les techniques d'encodage et de récupération changent radicalement l'apprentissage."
    definition: |
      La mémoire déclarative (consciente) comprend la mémoire épisodique (événements
      personnels) et sémantique (faits généraux). La mémoire procédurale (compétences)
      est implicite. La consolidation : les souvenirs sont instables lors de l'encodage
      et se stabilisent progressivement (hippocampe → cortex pendant le sommeil).
      Ebbinghaus a quantifié la courbe de l'oubli : ~50% oublié en 1h, ~70% en 24h
      sans révision. Bjork a identifié les "desirable difficulties" — les stratégies
      d'apprentissage efficaces semblent plus lentes mais produisent une mémorisation
      durable. La répétition espacée (réviser à intervalles croissants) est l'outil
      le plus efficace connu. L'effet de test : se tester soi-même est plus efficace
      que relire — la récupération active renforce l'encodage. Les souvenirs sont
      reconstructifs — chaque rappel les modifie légèrement.
    utilite: |
      Abandonner la relecture passive pour le testing actif et la répétition espacée
      (Anki, systèmes de cartes). La qualité du sommeil conditionne directement
      la consolidation — apprendre sans dormir gaspille l'apprentissage.
    pattern: "Je relis mes notes mais je n'arrive pas à retenir. Je dois reconsulter ce que j'ai déjà appris plusieurs fois."
    concepts_lies:
      - "sommeil"
      - "attention-profonde-deep-work"
      - "neuroplasticite"
      - "emdr-desensibilisation-par-les-mouvements-oculaires"

  - titre: "Hémisphères cérébraux — McGilchrist"
    vocabulaire:
      - "hémisphère gauche / droit"
      - "attention focalisée vs attention diffuse"
      - "appréhension (right hemisphere) vs manipulation (left hemisphere)"
      - "monde rendu (emissary)"
      - "maître et son émissaire"
    question: clarte
    domaine: "neurosciences / philosophie"
    penseur: "Iain McGilchrist"
    statut: nuance
    definition_courte: "Les deux hémisphères cérébraux ne traitent pas les mêmes types d'information mais entretiennent des modes attentionnels fondamentalement différents — avec des implications culturelles profondes."
    definition: |
      McGilchrist (psychiatre et philosophe) rejette la vulgate "gauche = logique,
      droit = créatif" comme trop simpliste. Sa thèse : l'hémisphère gauche a une
      attention focalisée, manipulatrice, catégorisante (il réduit le monde à des
      représentations utilisables) ; le droit a une attention diffuse, contextuelle,
      attentive à la nouveauté et à la relation (il appréhende le monde dans sa
      totalité). La culture occidentale moderne serait "dominée par le gauche" —
      privilégiant la manipulation sur la compréhension, le mécanisme sur la vie.
      Statut nuancé : thèse philosophique ambitieuse soutenue par des données
      neuroanatomiques réelles mais dont les implications culturelles sont spéculatives
      et difficiles à falsifier. Utile comme cadre conceptuel, pas comme neuroscience
      directement applicable.
    utilite: |
      Framework utile pour penser la complémentarité entre modes de pensée analytique
      et holistique, et les risques d'hyper-rationalisation. Moins utile comme
      guide pratique direct.
    pattern: "Je sur-analyse et je perds le sens de l'ensemble. Je ne sais pas quand raisonner analytiquement et quand faire confiance à une intuition plus large."
    concepts_lies:
      - "systeme-1-systeme-2"
      - "meta-cognition"
      - "modeles-mentaux"
      - "mindfulness-pleine-conscience"

