  # ============================================================
  # Q4 — POURQUOI MES RELATIONS FONCTIONNENT OU ÉCHOUENT ?
  # ============================================================

  - titre: "Les 4 cavaliers de Gottman"
    vocabulaire:
      - "criticism (critique du caractère)"
