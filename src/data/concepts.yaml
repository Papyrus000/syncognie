    question: corps
    domaine: "psychologie clinique / traumatologie"
    penseur: "Judith Herman, Bessel van der Kolk, Onno van der Hart"
    statut: nuance
    definition_courte: "La dissociation est un mécanisme de protection face à une surcharge traumatique — couper la connexion entre expérience, mémoire et identité."
    definition: |
      Herman a distingué le PTSD simple (événement unique) du trauma complexe
      (exposition répétée, souvent précoce : abus, négligence, violences chroniques).
      Le C-PTSD inclut des perturbations durables de la régulation émotionnelle,
      de l'identité et des relations, au-delà des symptômes de reviviscence du PTSD.
      Van der Kolk a popularisé l'idée que le trauma est encodé dans le corps :
      "the body keeps the score." La fenêtre de tolérance (Siegel) : zone d'activation
      optimale où la régulation est possible — le trauma la rétrécit. La dissociation
      (van der Hart) : structuration de la personnalité en parties fonctionnelles et
      parties traumatiques qui ne communiquent pas. Statut nuancé : modèles cliniquement
      utiles, opérationnalisation variable selon les écoles.
    utilite: |
      Explique pourquoi certaines personnes "s'éteignent" émotionnellement (hypo-arousal)
      ou perdent le contrôle (hyper-arousal) sans raison apparente. Oriente vers des
      traitements adaptés (thérapie phase-based, EMDR, thérapie sensorimotrice).
    pattern: "Je me sens parfois déconnecté de moi-même ou de la réalité. Je réagis de façon disproportionnée à certains déclencheurs."
    concepts_lies:
