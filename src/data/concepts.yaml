    definition: |
      Les Kaplan ont développé la théorie de la restauration attentionnelle (ART) :
      l'attention dirigée (effort cognitif) s'épuise — les environnements "fascinants"
      (nature, ambiances douces) et le retrait social permettent la récupération.
      Buchholz a distingué solitude choisie (ressourcement) et solitude subie
      (isolement douloureux). Les introvertis ont un seuil d'arousal social plus
      bas — ils s'épuisent plus vite en interaction sociale et récupèrent par
      la solitude. Mais même les extravertis ont besoin de temps seul pour
      l'intégration, la réflexion et la créativité. La solitude profonde est
      distincte de la simple absence d'interaction — elle requiert l'absence de
      stimulation externe et l'orientation vers l'intérieur. Statut nuancé :
      bonne base théorique, opérationnalisation variable.
    utilite: |
      Légitimer le besoin de solitude comme nécessité physiologique, pas luxe social.
      Différencier épuisement social (besoin de solitude) d'évitement anxieux (besoin
      de connexion). Concevoir des rituels de retraite régulière.
    pattern: "Je me sens coupable de vouloir être seul. Je suis épuisé par les interactions mais je ne me donne pas le temps de récupérer."
    concepts_lies:
      - "attention-profonde-deep-work"
      - "recuperation-et-cycles-deffort"
      - "besoins-fondamentaux-sdt"
      - "resilience-facteurs-documentes"

