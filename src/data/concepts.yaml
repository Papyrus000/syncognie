    penseur: "John Gottman, Julie Gottman"
    statut: solide
    definition_courte: "Quatre comportements qui prédisent la rupture avec 90% de précision — et leurs antidotes."
    definition: |
      Gottman a étudié des milliers de couples sur 40 ans. Quatre comportements
      prédisent la rupture. Criticism : attaquer le caractère ("tu es toujours...")
      plutôt que le comportement ("quand tu fais ça, je ressens..."). Contempt :
      mépris, sarcasme, roulement des yeux — le plus toxique, prédit aussi les
      maladies infectieuses du partenaire. Defensiveness : contre-attaquer plutôt
      qu'écouter — "c'est pas ma faute, c'est toi qui...". Stonewalling : mur,
      retrait émotionnel complet — souvent une réponse à un arousal physiologique
      trop élevé. Ces patterns s'appliquent hors couple : travail, famille, amitié.
    utilite: |
      Reconnaître ces patterns en temps réel (ou a posteriori) change la dynamique
      des conflits. Les antidotes sont identifiés et apprenables.
    pattern: "Nos disputes finissent toujours de la même façon. Je deviens froid et distant pendant les conflits."
    concepts_lies:
