      raccourcissement des télomères, altérations épigénétiques, perte de protéostase,
      dysfonction mitochondriale, sénescence cellulaire, épuisement des cellules
      souches, altérations de la communication intercellulaire). Sinclair (théorie
      de l'information) postule que le vieillissement est principalement une perte
      d'information épigénétique — remédiation possible. Attia (médecine 3.0) met
      l'accent sur le VO2max et la force musculaire comme prédicteurs indépendants
      de la longévité et de la qualité de vie à 80 ans. Les interventions à meilleure
      base de preuve chez l'humain restent : exercice (zone 2 + renforcement),
      sommeil, alimentation, gestion du stress. Les interventions pharmacologiques
      (rapamycin, NMN) sont prometteuses chez l'animal, données humaines limitées.
    utilite: |
      Décisions concrètes : développer VO2max et force musculaire dès 30-40 ans,
      maintenir le muscle en vieillissant, éviter la sédentarité prolongée.
      Ne pas attendre les symptômes — la biologie du vieillissement commence tôt.
    pattern: "Je reporte les décisions de santé à plus tard. Je néglige la force musculaire et le cardio en pensant que c'est optionnel avant 50 ans."
    concepts_lies:
      - "exercice-et-cerveau"
      - "sommeil"
      - "jeune-intermittent"
      - "physiologie-du-stress"

