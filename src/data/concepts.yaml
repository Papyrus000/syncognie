    question: conflits
    domaine: "psychologie / neurosciences"
    penseur: "Brené Brown, Tania Singer, Paul Bloom"
    statut: solide
    definition_courte: "L'empathie connecte, la sympathie isole — et trop d'empathie affective épuise sans aider."
    definition: |
      Brown distingue empathie (se mettre dans le cadre de l'autre sans jugement,
      "je comprends pourquoi tu ressens ça") et sympathie ("au moins..."). La
      sympathie crée de la distance. Singer distingue l'empathie affective
      (ressentir ce que l'autre ressent — épuisante, mène à la détresse empathique)
      de l'empathie cognitive (comprendre ce que l'autre ressent sans le ressentir
