    definition_courte: "Les thérapies les mieux validées empiriquement — modifier les pensées automatiques et les comportements d'évitement pour modifier les émotions."
    definition: |
      Beck a développé la thérapie cognitive à partir d'une observation : les
      dépressifs ont des pensées automatiques négatves reconnaissables et modifiables.
      Principe : les événements activent des croyances qui produisent des conséquences
      émotionnelles (modèle ABC d'Ellis). La restructuration cognitive : identifier
      la distorsion (catastrophisation, pensée en tout ou rien, personnalisation,
      lecture de pensée...) et la remettre en question. L'exposition : approcher
      progressivement ce qu'on évite pour défaire la réponse de peur. Les TCC
      sont les mieux validées pour dépression, anxiété, TOC, phobies, PTSD.
    utilite: |
      Offre des outils concrets et pratiquables sans thérapeute pour les formes
