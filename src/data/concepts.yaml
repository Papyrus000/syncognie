    statut: nuance
    definition_courte: "Trois états du moi (Parent, Adulte, Enfant) et leurs interactions structurent les communications et les patterns relationnels répétitifs."
    definition: |
      Berne a développé l'AT en rupture avec la psychanalyse classique — vocabulaire
      accessible, orienté vers l'autonomie. Les trois états du moi : Parent (pensées/
      comportements introjectés des figures parentales — normatif ou nourricier),
      Adulte (traitement rationnel du présent), Enfant (états issus de l'expérience
      infantile — libre, adapté, rebelle). Les transactions croisées (ex : Adulte-Adulte
      qui reçoit une réponse Parent-Enfant) produisent les malentendus. Le triangle
      dramatique de Karpman : oscillations entre Persécuteur, Sauveur et Victime
      dans les jeux psychologiques. Le scénario de vie : script inconscient de
      comment sa vie doit se dérouler. Statut nuancé : modèle cliniquement utile
      pour comprendre les patterns relationnels, fondements théoriques non falsifiables.
    utilite: |
      Outil pratique pour repérer depuis quel état on parle et à quel état on
      s'adresse. Le triangle de Karpman est particulièrement utile pour identifier
      les jeux relationnels dans lesquels on se retrouve coincé.
