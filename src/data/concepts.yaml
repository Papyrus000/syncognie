    statut: solide
    definition_courte: "Plutôt que de changer les pensées négatives, apprendre à ne pas être gouverné par elles — et agir selon ses valeurs malgré leur présence."
    definition: |
      L'ACT ne vise pas à réduire les pensées et émotions difficiles mais à
      modifier la relation qu'on entretient avec elles. La défusion cognitive :
      observer ses pensées comme des événements mentaux plutôt que des vérités
      ("j'ai la pensée que je suis nul" vs "je suis nul"). La fusion cognitive :
      être absorbé par ses pensées, les prendre pour la réalité. L'acceptation :
      faire de la place à l'inconfort sans le combattre. L'action engagée : agir
      selon ses valeurs même en présence de peur, douleur, incertitude. Particulièrement
      efficace pour la douleur chronique, l'anxiété généralisée, la dépression.
    utilite: |
      Complément puissant des TCC : là où les TCC cherchent à modifier le contenu
