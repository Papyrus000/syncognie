      (probiotiques à effets mentaux) montrent des résultats préliminaires positifs
      mais les études sont hétérogènes. Champ en développement rapide, attention
      aux sur-interprétations commerciales.
    utilite: |
      Justifie l'attention portée à l'alimentation (fibres, fermentés) et au
