# ============================================================
# SOCLE DE LA CONNAISSANCE UTILE
# ============================================================
# Filtre appliqué : une connaissance passe si elle
# (1) change une décision concrète
# (2) explique un pattern observable
# (3) immunise contre une erreur coûteuse
# (4) est réfutable et testée
#
# Statuts épistémiques :
#   solide    → réfutable, répliqué, consensus scientifique
#   nuance    → outils pratiques, fondements discutables
#   emergent  → prometteur, encore en consolidation
#
# Structure de chaque concept :
#   titre           → nom du concept
#   vocabulaire     → mots clés précis du penseur / domaine
#   question        → question de vie à laquelle il répond
#   domaine         → origine académique
#   penseur         → auteur(s) de référence
#   statut          → solide | nuance | emergent
#   definition_courte → une phrase, la plus précise possible
#   definition      → développement complet
#   utilite         → pourquoi ça change quelque chose concrètement
#   pattern         → ce que tu reconnais dans ta vie
#   concepts_lies   → ponts vers d'autres entrées
# ============================================================

meta:
  version: "1.0"
  questions:
    - id: comportement
      label: "Pourquoi je me comporte comme ça ?"
    - id: emotions
      label: "Pourquoi je ressens ça ?"
    - id: changement
      label: "Pourquoi je n'arrive pas à changer ?"
    - id: relations
      label: "Pourquoi mes relations fonctionnent ou échouent ?"
    - id: influence
      label: "Comment les autres m'influencent sans que je le voie ?"
    - id: conflits
      label: "Comment naviguer les conflits ?"
    - id: corps
      label: "Comment mon corps influence mon esprit ?"
    - id: sante
      label: "Comment optimiser mon énergie et ma santé ?"
    - id: decisions
      label: "Pourquoi je prends de mauvaises décisions ?"
    - id: clarte
      label: "Comment penser plus clairement ?"

concepts:

  # ============================================================
  # Q1 — POURQUOI JE ME COMPORTE COMME ÇA ?
  # ============================================================

  - titre: "Théorie de l'attachement"
    vocabulaire:
      - "style d'attachement"
      - "base sécure"
      - "modèle interne opérant"
      - "attachement sécure / anxieux / évitant / désorganisé"
      - "hyperactivation / désactivation du système d'attachement"
    question: comportement
    domaine: "psychologie du développement"
    penseur: "John Bowlby, Mary Ainsworth, Mary Main"
    statut: solide
    definition_courte: "Les premières relations forment un modèle interne qui structure toutes les relations adultes."
    definition: |
      Bowlby a montré que l'enfant développe un système d'attachement biologique —
      un besoin de proximité avec une figure protectrice. Selon la réponse de cette
      figure (disponible, imprévisible, absente, effrayante), l'enfant construit un
      modèle interne opérant : une représentation de lui-même et des autres qui
      devient le filtre de toutes ses relations futures. Ainsworth a identifié trois
      styles, Main en a ajouté un quatrième. Ces styles ne sont pas des condamnations
      — ils sont des adaptations à un environnement précoce.
    utilite: |
      Comprendre son style d'attachement explique des patterns relationnels qui
      semblaient mystérieux : pourquoi on s'éloigne quand quelqu'un se rapproche,
      pourquoi on devient anxieux quand l'autre ne répond pas, pourquoi certaines
      relations reproduisent toujours le même scénario.
    pattern: "Je refais toujours les mêmes erreurs en relation. Je choisis les mêmes types de personnes."
    concepts_lies:
      - "la-danse-anxieux-evitant"
      - "dissociation-et-trauma-complexe"
      - "regulation-emotionnelle"
      - "tcc-therapies-cognitivo-comportementales"

  - titre: "Styles d'attachement adulte"
    vocabulaire:
      - "sécure"
      - "anxieux-préoccupé"
      - "évitant-détaché"
      - "désorganisé-craintif"
      - "activation / désactivation"
    question: comportement
    domaine: "psychologie clinique"
    penseur: "Phillip Shaver, Mario Mikulincer, Amir Levine, Rachel Heller"
    statut: solide
    definition_courte: "Quatre façons d'être en relation selon la disponibilité perçue des autres et la valeur perçue de soi."
    definition: |
      Le style sécure fait confiance naturellement, tolère la distance sans alarme.
      L'anxieux surveille en permanence les signaux de rejet, amplifie les émotions
      pour maintenir la connexion. L'évitant coupe l'accès émotionnel pour se protéger,
      valorise l'indépendance. Le désorganisé veut la proximité et la craint simultanément
      — souvent lié à un trauma précoce. Ces styles se modifient par l'expérience
      relationnelle et la thérapie.
    utilite: |
      Identifier son style change radicalement l'auto-compréhension. Ce qui semblait
      être un défaut de caractère devient une stratégie adaptative compréhensible.
      Connaître le style de l'autre permet d'interpréter ses comportements sans
      sur-réagir.
    pattern: "Pourquoi lui/elle s'éloigne quand j'ai besoin de proximité. Pourquoi je panique quand il/elle ne répond pas."
    concepts_lies:
      - "theorie-de-lattachement"
      - "la-danse-anxieux-evitant"
      - "les-4-cavaliers-de-gottman"

  - titre: "Biais cognitifs"
    vocabulaire:
      - "heuristique"
      - "Système 1 / Système 2"
      - "biais de confirmation"
      - "biais d'attribution"
      - "biais de disponibilité"
      - "effet de cadrage"
      - "biais du statu quo"
      - "aversion à la perte"
    question: comportement
    domaine: "psychologie cognitive"
    penseur: "Daniel Kahneman, Amos Tversky"
    statut: solide
    definition_courte: "Raccourcis mentaux systématiques qui dévient le raisonnement de façon prévisible."
    definition: |
      Kahneman et Tversky ont cartographié des dizaines de biais reproductibles.
      Le biais de confirmation : on ne voit que ce qui confirme ce qu'on croit déjà.
      Le biais d'attribution : on explique ses échecs par les circonstances, ceux des
      autres par leur caractère. Le biais de disponibilité : on surestime ce qui est
      mémorable ou récent. L'aversion à la perte : perdre 100€ fait deux fois plus
      mal que gagner 100€ fait plaisir. Ces biais ne sont pas des stupidités — ce sont
      des solutions évolutives efficaces dans l'environnement ancestral, inadaptées
      à certains contextes modernes.
    utilite: |
      Connaître les biais ne les élimine pas, mais crée un espace entre le stimulus
      et la réaction. On peut apprendre à se demander : quel biais pourrait opérer ici ?
    pattern: "Je suis convaincu d'avoir raison alors que je n'ai entendu qu'un côté. Je prends une décision différente selon comment elle est présentée."
    concepts_lies:
      - "systeme-1-systeme-2"
      - "cout-irrecuperable"
      - "pensee-probabiliste"
      - "economie-comportementale"

  - titre: "Système 1 / Système 2"
    vocabulaire:
      - "pensée rapide / pensée lente"
      - "automatique / délibéré"
      - "heuristique de jugement"
      - "substitution d'attribut"
      - "illusion de compréhension"
    question: comportement
    domaine: "psychologie cognitive"
    penseur: "Daniel Kahneman"
    statut: solide
    definition_courte: "Le cerveau opère sur deux modes — automatique et rapide, ou délibéré et lent — et confond les deux en permanence."
    definition: |
      Système 1 : rapide, automatique, émotionnel, associatif. Il fonctionne en
      permanence, génère des impressions et des intuitions. Système 2 : lent,
      délibéré, logique, coûteux en énergie. Le problème central : Système 2 croit
      qu'il décide, mais la plupart du temps il rationalise après coup les décisions
      déjà prises par Système 1. L'illusion de compréhension : on croit comprendre
      le monde mieux qu'on ne le fait, parce que Système 1 génère des récits cohérents
      à partir de données incomplètes.
    utilite: |
      Comprendre que la rationalisation vient après la décision émotionnelle change
      comment on se juge et comment on juge les autres. On arrête de chercher la
      logique là où il y a de l'émotion déguisée en logique.
    pattern: "Je prends une décision puis je trouve des raisons pour la justifier. Je crois réfléchir alors que je réagis."
    concepts_lies:
      - "biais-cognitifs"
      - "fatigue-decisionnelle"
      - "economie-comportementale"

  - titre: "Mécanismes de défense"
    vocabulaire:
      - "déni"
      - "projection"
      - "rationalisation"
      - "dissociation"
      - "idéalisation / dévalorisation"
      - "acting out"
      - "intellectualisation"
    question: comportement
    domaine: "psychologie clinique"
    penseur: "Sigmund Freud, Anna Freud, Nancy McWilliams"
    statut: nuance
    definition_courte: "Stratégies inconscientes que le psychisme utilise pour se protéger d'une anxiété insupportable."
    definition: |
      McWilliams en propose la cartographie la plus opérationnelle. La projection :
      attribuer à l'autre ce qu'on ne supporte pas en soi. La rationalisation :
      trouver de bonnes raisons à ce qu'on fait pour de mauvaises raisons.
      L'intellectualisation : penser les émotions plutôt que les ressentir.
      Le déni : ne pas voir ce qui est trop menaçant. Ces mécanismes ne sont pas
      pathologiques en soi — ils sont adaptatifs jusqu'au moment où ils empêchent
      de voir la réalité. Statut nuancé : utile comme langage descriptif, pas
      strictement réfutable au sens scientifique.
    utilite: |
      Identifier ses mécanismes de défense habituels permet de comprendre pourquoi
      certaines réalités sont invisibles pour soi, et visibles pour tout le monde autour.
    pattern: "Je vois chez les autres exactement ce que je ne supporte pas en moi. Je trouve toujours de bonnes raisons pour ce que je fais."
    concepts_lies:
      - "biais-cognitifs"
      - "trauma-et-corps"
      - "mecanismes-de-defense"

  - titre: "Psychologie évolutionnaire"
    vocabulaire:
      - "adaptation évolutive"
      - "environnement ancestral"
      - "fitness reproductif"
      - "altruisme réciproque"
      - "détection de tricheur"
      - "just-so story"
    question: comportement
    domaine: "psychologie évolutionnaire"
    penseur: "Robert Trivers, Leda Cosmides, John Tooby, Steven Pinker"
    statut: nuance
    definition_courte: "Les comportements humains universels sont des solutions évolutives à des problèmes ancestraux récurrents."
    definition: |
      La jalousie, l'aversion au risque, le tribalisme, la hiérarchie sociale, le
      désir de statut — ce ne sont pas des défauts ou des constructions culturelles
      arbitraires. Ce sont des adaptations sélectionnées parce qu'elles augmentaient
      la survie et la reproduction dans l'environnement ancestral. Trivers a formalisé
      l'altruisme réciproque : on aide ceux qui nous aideront en retour. Attention aux
      just-so stories — explications narratives post-hoc non testables. Le cadre
      général est solide, certaines applications spécifiques sont spéculatives.
    utilite: |
      Comprendre l'origine évolutive d'un comportement réduit la honte et augmente
      la compréhension. On arrête de se battre contre sa nature et on commence à
      la comprendre pour mieux la naviguer.
    pattern: "Je réagis de façon disproportionnée à certaines situations sociales. Je suis obsédé par ce que les autres pensent de moi."
    concepts_lies:
      - "biais-cognitifs"
      - "hierarchie-sociale-et-statut"
      - "neuromodulateurs-cles"

  # ============================================================
  # Q2 — POURQUOI JE RESSENS ÇA ?
  # ============================================================

  - titre: "Émotions construites"
    vocabulaire:
      - "construction émotionnelle"
      - "granularité émotionnelle"
      - "concept émotionnel"
      - "prédiction active"
      - "intéroception"
      - "affect de base"
    question: emotions
    domaine: "neurosciences affectives"
    penseur: "Lisa Feldman Barrett"
    statut: solide
    definition_courte: "Les émotions ne sont pas des réactions câblées — elles sont construites par le cerveau à partir de signaux corporels et de contexte."
    definition: |
      Barrett réfute le modèle classique des émotions universelles (Ekman). Le
      cerveau ne réagit pas aux émotions — il les fabrique. Il reçoit des signaux
      corporels bruts (intéroception), les combine avec le contexte et les concepts
      émotionnels disponibles, et construit une émotion. Conséquence majeure :
      plus tu as de mots précis pour tes états émotionnels (granularité émotionnelle
      élevée), plus ton cerveau peut construire des réponses fines et adaptées.
      Une personne avec peu de vocabulaire émotionnel vit dans un monde de
      "je me sens bien / je me sens mal".
    utilite: |
      Augmenter son vocabulaire émotionnel n'est pas un exercice littéraire —
      c'est une intervention neurobiologique directe. Nommer précisément ce qu'on
      ressent régule physiologiquement l'activation du système limbique.
    pattern: "Je sais que quelque chose ne va pas mais je ne sais pas quoi. Je dis 'je suis stressé' pour tout."
    concepts_lies:
      - "interoception"
      - "regulation-emotionnelle"
      - "neuromodulateurs-cles"
      - "emotions-construites"

  - titre: "Neuromodulateurs clés"
    vocabulaire:
      - "dopamine"
      - "sérotonine"
      - "cortisol"
      - "ocytocine"
      - "noradrénaline"
      - "GABA"
      - "système de récompense"
      - "circuit mésolimbique"
    question: emotions
    domaine: "neurosciences"
    penseur: "Robert Sapolsky, Andrew Huberman, Kent Berridge"
    statut: solide
    definition_courte: "Les molécules qui régulent motivation, humeur, stress, lien social et arousal — pas comme on le croit souvent."
    definition: |
      Dopamine : gère l'anticipation et la motivation, pas le plaisir lui-même
      (Kent Berridge distingue wanting vs liking). Explique la dépendance, la
      procrastination, l'addiction aux réseaux sociaux. Sérotonine : sentiment
      de sécurité, statut social perçu, stabilité de l'humeur. Cortisol : hormone
      du stress — utile en aigu, destructeur en chronique (mémoire, immunité,
      métabolisme, cardiovasculaire). Ocytocine : lien social et confiance, mais
      aussi renforce les préjugés envers l'out-group. Noradrénaline : focus et
      arousal, excès = anxiété, manque = léthargie.
    utilite: |
      Comprendre ces mécanismes change l'interprétation de ses propres états.
      Le manque de motivation n'est pas une faiblesse de caractère — c'est
      souvent un problème de dopamine basale. L'anxiété sociale n'est pas une
      timidité — c'est souvent de la noradrénaline et du cortisol.
    pattern: "Je procrastine alors que je veux vraiment faire ce projet. Je me sens vide après avoir obtenu ce que je voulais."
    concepts_lies:
      - "emotions-construites"
      - "neuromodulateurs-cles"
      - "physiologie-du-stress"
      - "sommeil"

  - titre: "Intéroception"
    vocabulaire:
      - "intéroception"
      - "signaux corporels"
      - "conscience corporelle"
      - "nerf vague"
      - "gut feeling"
      - "marqueur somatique"
    question: emotions
    domaine: "neurosciences"
    penseur: "Antonio Damasio, Lisa Feldman Barrett, A.D. Craig"
    statut: solide
    definition_courte: "La capacité à percevoir les signaux internes du corps — le substrat physiologique des émotions et de l'intuition."
    definition: |
      Damasio (hypothèse du marqueur somatique) a montré que les décisions
      rationnelles dépendent des signaux corporels. Des patients avec lésions
      du cortex préfrontal ventromédian, incapables de ressentir ces marqueurs,
      prennent des décisions catastrophiques malgré un raisonnement logique intact.
      L'intéroception c'est la capacité à percevoir rythme cardiaque, tension
      musculaire, digestion, température interne. Barrett montre que c'est le
      matériau brut à partir duquel le cerveau construit les émotions.
    utilite: |
      Développer l'intéroception améliore la régulation émotionnelle, la qualité
      des décisions et la conscience de ses propres besoins. C'est une compétence
      entraînable par la méditation, le yoga, la thérapie somatique.
    pattern: "Je ne me rends compte que j'étais épuisé qu'après être tombé malade. Je confonds faim et anxiété."
    concepts_lies:
      - "emotions-construites"
      - "systeme-nerveux-autonome"
      - "trauma-et-corps"
      - "mindfulness-pleine-conscience"

  - titre: "Régulation émotionnelle"
    vocabulaire:
      - "régulation émotionnelle"
      - "réévaluation cognitive"
      - "suppression émotionnelle"
      - "tolérance à la détresse"
      - "fenêtre de tolérance"
      - "co-régulation"
    question: emotions
    domaine: "psychologie clinique"
    penseur: "James Gross, Daniel Siegel, Marsha Linehan"
    statut: solide
    definition_courte: "Les stratégies conscientes et inconscientes pour moduler l'intensité, la durée et l'expression des émotions."
    definition: |
      Gross distingue la réévaluation cognitive (modifier l'interprétation d'une
      situation avant que l'émotion monte) de la suppression (bloquer l'expression
      après que l'émotion est déjà là). La réévaluation est plus efficace et moins
      coûteuse cognitivement. Siegel parle de fenêtre de tolérance : la zone
      d'activation optimale où on peut traiter l'expérience sans être débordé
      (hyper-arousal) ni coupé (hypo-arousal). La co-régulation : on régule
      nos émotions via celles des autres — base neurobiologique du besoin de lien.
    utilite: |
      Comprendre qu'il existe des stratégies de régulation plus ou moins efficaces
      change l'approche. On arrête de supprimer et on apprend à réévaluer, nommer,
      tolérer.
    pattern: "Je ravale mes émotions puis elles explosent. Je suis débordé par des émotions qui semblent disproportionnées."
    concepts_lies:
      - "emotions-construites"
      - "systeme-nerveux-autonome"
      - "regulation-emotionnelle"
      - "tcc-therapies-cognitivo-comportementales"

  # ============================================================
  # Q3 — POURQUOI JE N'ARRIVE PAS À CHANGER ?
  # ============================================================

  - titre: "Neuroplasticité"
    vocabulaire:
      - "neuroplasticité"
      - "potentiation à long terme (LTP)"
      - "synaptogenèse"
      - "élagage synaptique"
      - "BDNF"
      - "Hebb : neurons that fire together wire together"
    question: changement
    domaine: "neurosciences"
    penseur: "Donald Hebb, Michael Merzenich, Eric Kandel"
    statut: solide
    definition_courte: "Le cerveau adulte se reconfigure structurellement en fonction de ce qu'on pratique — le changement est possible mais demande de la répétition."
    definition: |
      Le principe de Hebb (1949) : les neurones qui s'activent ensemble se
      connectent ensemble. Chaque répétition renforce une connexion synaptique.
      Le BDNF (Brain-Derived Neurotrophic Factor) est le fertilisant neuronal —
      stimulé par l'exercice, le sommeil, la nouveauté. La neuroplasticité est
      réelle à tout âge mais diminue avec l'âge sans stimulation active.
      Conséquence : ce que tu pratiques se renforce, ce que tu n'utilises pas
      s'atrophie. Le changement n'est pas une question d'intention mais de
      répétition dans le temps.
    utilite: |
      Remplace la croyance "je suis comme ça" par "j'ai pratiqué ça suffisamment
      longtemps pour que ça devienne automatique". Change la relation au changement :
      il est possible, mais pas instantané.
    pattern: "J'essaie de changer et ça ne dure pas. Je retombe toujours dans les mêmes comportements."
    concepts_lies:
      - "pratique-deliberee"
      - "pre-engagement-dispositifs-dulysse"
      - "sommeil"
      - "exercice-et-cerveau"

  - titre: "Épigénétique comportementale"
    vocabulaire:
      - "épigénétique"
      - "méthylation de l'ADN"
      - "expression génique"
      - "déterminisme génétique"
      - "gène × environnement"
    question: changement
    domaine: "biologie moléculaire"
    penseur: "Michael Meaney, Bruce Lipton (avec précaution), Randy Jirtle"
    statut: solide
    definition_courte: "L'environnement et le comportement modifient l'expression des gènes sans changer l'ADN — tu n'es pas prisonnier de ton génome."
    definition: |
      L'épigénétique montre que les gènes sont des possibilités, pas des destins.
      La méthylation de l'ADN peut activer ou éteindre des gènes en fonction du
      stress, de l'alimentation, des relations, du sommeil. Meaney a montré chez
      les rats que les soins maternels modifient l'expression des gènes du stress
      de façon transgénérationnelle. Attention : Bruce Lipton va trop loin dans
      ses affirmations populaires. La base scientifique est solide, certaines
      applications populaires sont spéculatives.
    utilite: |
      Réfute le déterminisme génétique pur. Les choix de vie ont un impact
      biologique mesurable. La génétique donne des probabilités, pas des certitudes.
    pattern: "Dans ma famille tout le monde est comme ça, je peux pas y faire grand chose. C'est dans mes gènes."
    concepts_lies:
      - "neuroplasticite"
      - "inflammation-chronique-de-bas-grade"
      - "physiologie-du-stress"

  - titre: "Pratique délibérée"
    vocabulaire:
      - "deliberate practice"
      - "zone proximale de développement"
      - "feedback immédiat"
      - "représentations mentales"
      - "expertise"
      - "règle des 10 000 heures (mal comprise)"
    question: changement
    domaine: "psychologie cognitive"
    penseur: "Anders Ericsson, Vygotski"
    statut: solide
    definition_courte: "L'expertise vient d'un type spécifique de pratique — à la limite de ses capacités, avec feedback immédiat, sur ses faiblesses."
    definition: |
      Ericsson a montré que ce n'est pas le nombre d'heures qui crée l'expertise
      mais la qualité de la pratique. La pratique délibérée : hors zone de confort,
      juste au-delà de ses capacités actuelles, avec feedback immédiat et précis,
      focalisée sur les faiblesses spécifiques. La règle des 10 000 heures de
      Gladwell déforme Ericsson — Ericsson lui-même a contesté cette vulgarisation.
      10 000 heures de pratique non délibérée ne créent pas l'expertise.
    utilite: |
      Change la façon dont on apprend et dont on s'améliore. Passer du temps n'est
      pas suffisant. La qualité de l'attention et du feedback est ce qui compte.
    pattern: "Je fais la même chose depuis 10 ans et je ne m'améliore plus. Je travaille beaucoup sans progresser."
    concepts_lies:
      - "neuroplasticite"
      - "flow-etat-optimal-dexperience"
      - "motivation-intrinseque-vs-extrinseque"
      - "science-de-lapprentissage"

  - titre: "Science de l'apprentissage"
    vocabulaire:
      - "spacing effect (effet d'espacement)"
      - "testing effect (récupération en mémoire)"
      - "interleaving (entrelacement)"
      - "desirable difficulties"
      - "illusion de maîtrise"
    question: changement
    domaine: "psychologie cognitive"
    penseur: "Robert Bjork, Henry Roediger, Hermann Ebbinghaus"
    statut: solide
    definition_courte: "Les méthodes d'apprentissage intuitives sont sous-optimales — les méthodes efficaces sont contre-intuitives."
    definition: |
      L'effet d'espacement : réviser à intervalles croissants bat le bachotage.
      L'effet de test : se tester activement (récupération en mémoire) bat la
      relecture passive. L'entrelacement : alterner plusieurs sujets bat la
      répétition d'un seul. Les desirable difficulties : rendre l'apprentissage
      plus difficile améliore la rétention à long terme même si ça semble moins
      efficace à court terme. L'illusion de maîtrise : après une relecture fluide,
      on croit savoir alors qu'on a seulement de la familiarité.
    utilite: |
      Changer ses méthodes d'apprentissage peut doubler ou tripler l'efficacité
      sans augmenter le temps passé.
    pattern: "Je relis mes notes et j'ai l'impression de savoir, puis à l'examen ou en pratique, rien ne sort."
