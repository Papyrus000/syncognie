      l'éliminer. Rasoir d'Ockham : entre deux explications, la plus simple est
      préférable. Pareto : 20% des causes produisent 80% des effets. First
      principles : décomposer jusqu'aux vérités fondamentales plutôt qu'analogiser
      depuis l'existant. Korzybski : "la carte n'est pas le territoire" — tout
      modèle est une simplification, jamais la réalité.
    utilite: |
      Chaque modèle est une lentille. Avoir plusieurs lentilles évite l'erreur
      de tout voir à travers une seule.
    pattern: "J'applique toujours la même approche à des problèmes différents. Je confonds mon modèle de la réalité avec la réalité."
    concepts_lies:
