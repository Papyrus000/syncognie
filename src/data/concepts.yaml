  - titre: "Schémas de Young — Thérapie des schémas"
    vocabulaire:
      - "schéma précoce inadapté"
      - "modes schématiques"
      - "abandon / carence affective / méfiance"
      - "surinvestissement / échec"
      - "style d'adaptation (capitulation / évitement / surcompensation)"
      - "reparentage limité"
    question: comportement
    domaine: "psychologie clinique"
    penseur: "Jeffrey Young"
    statut: nuance
    definition_courte: "Des croyances profondes sur soi et les autres, formées dans l'enfance, qui structurent les comportements dysfonctionnels répétitifs à l'âge adulte."
    definition: |
      Young, élève de Beck, a observé que les TCC classiques n'atteignaient pas
      les patterns les plus profonds. Il a identifié 18 schémas précoces inadaptés
      (SPI) — des représentations stables de soi-même et du monde formées en réponse
      à des besoins non satisfaits dans l'enfance. Exemples : abandon ("les autres
      vont me quitter"), carence affective ("personne ne m'aime vraiment"),
      méfiance/abus, échec, honte. Face à l'activation d'un schéma, trois styles
      d'adaptation : capitulation (se soumettre), évitement (fuir), surcompensation
      (faire le contraire à l'excès). Les modes décrivent des états émotionnels
      actifs à un moment donné. La thérapie des schémas combine TCC, attachement,
      gestalt, travail émotionnel. Moins validée empiriquement que les TCC standard
      mais plus utile pour les personnalités complexes.
    utilite: |
      Explique pourquoi les mêmes patterns relationnels ou comportementaux
      se répètent malgré la prise de conscience. Plus complet que les TCC
      pour les troubles de la personnalité et les difficultés relationnelles
      chroniques.
    pattern: "Je sais que ce comportement me fait du mal mais je le reproduis quand même. Mes relations récapitulent toujours le même scénario douloureux."
    concepts_lies:
      - "styles-dattachement-adulte"
      - "tcc-therapies-cognitivo-comportementales"
      - "distorsions-cognitives-de-beck"
      - "dissociation-et-trauma-complexe"

  - titre: "Pré-engagement — dispositifs d'Ulysse"
    vocabulaire:
      - "pré-engagement (precommitment)"
      - "dispositif d'Ulysse"
      - "incohérence temporelle"
      - "moi présent vs moi futur"
      - "auto-contrôle par l'environnement"
      - "coût d'engagement"
    question: changement
    domaine: "économie comportementale / psychologie"
    penseur: "Richard Thaler, Thomas Schelling, Dan Ariely"
    statut: solide
    definition_courte: "Restreindre ses propres options futures maintenant pour protéger ses objectifs d'un soi futur moins discipliné."
    definition: |
      Ulysse s'est fait attacher au mât pour ne pas succomber au chant des Sirènes —
      il savait que son moi futur (sous l'emprise du chant) prendrait une mauvaise
      décision, alors son moi présent a éliminé cette option. L'incohérence
      temporelle (Thaler) : on préfère 100€ maintenant à 110€ dans un mois, mais
      on préfère 110€ dans 13 mois à 100€ dans 12 mois — préférences inverses selon
      la distance temporelle. Les dispositifs de pré-engagement résolvent ce problème
      en structurant l'environnement ou en ajoutant des coûts à la transgression
      (comptes d'épargne bloqués, Beeminder, enlever les applications, signer
      un contrat social). Différent de la volonté pure — ne suppose pas une capacité
      de résistance infinie.
    utilite: |
      Outil de changement plus fiable que la "motivation" ou la "discipline" pour
      les comportements soumis à incohérence temporelle (alimentation, économies,
      procrastination, addictions). Concevoir l'environnement, pas compter sur le
      caractère.
    pattern: "Je prends de bonnes résolutions que je ne tiens pas. Je sais ce que je dois faire mais je ne le fais pas quand le moment vient."
    concepts_lies:
      - "fatigue-decisionnelle"
      - "pre-engagement-dispositifs-dulysse"
      - "economie-comportementale"
      - "biais-cognitifs"

  - titre: "Fatigue décisionnelle"
    vocabulaire:
      - "fatigue décisionnelle"
      - "ego depletion"
      - "épuisement du self"
      - "charge cognitive"
      - "automatisation des routines"
      - "charge décisionnelle"
    question: changement
    domaine: "psychologie sociale / cognitive"
    penseur: "Roy Baumeister, Shai Danziger"
    statut: nuance
    definition_courte: "La qualité des décisions se dégrade au fil des choix effectués dans la journée — les ressources cognitives pour décider sont limitées."
    definition: |
      Baumeister a proposé le modèle de l'ego depletion : l'auto-contrôle puise
      dans une ressource cognitive qui s'épuise. L'étude classique de Danziger
      sur les juges israéliens a montré des taux d'accord favorables qui chutent
      de ~65% à ~15% au fil des audiences (résultats controversés et difficiles
      à répliquer directement). Le modèle pur de la "ressource épuisable" a été
      remis en cause par des méta-analyses — les effets sont plus faibles que
      l'annoncé et dépendent de facteurs motivationnels et de croyances. Ce qui
      résiste : la qualité des décisions complexes se dégrade avec la surcharge
      cognitive, la faim et la fatigue. La décision suboptimale sous fatigue est
      robuste même si le mécanisme exact (ressource vs motivation) est débattu.
    utilite: |
      Structurer les décisions importantes en début de journée, automatiser les
      petites décisions récurrentes (routines vestimentaires, repas), réduire la
      charge décisionnelle totale. L'environnement décisionnel importe autant
      que la discipline.
    pattern: "Je prends de moins bonnes décisions en fin de journée. Je cède plus facilement à des tentations le soir que le matin."
