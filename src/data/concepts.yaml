    definition: |
      Rosenberg propose quatre étapes : observer sans évaluer ("tu as dit X"
      plutôt que "tu es toujours en retard"), identifier ce qu'on ressent,
      identifier le besoin sous-jacent, formuler une demande claire et négociable.
